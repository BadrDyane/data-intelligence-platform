version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: dip_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     dip_user
      POSTGRES_PASSWORD: dip_pass
      POSTGRES_DB:       dip_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dip_user -d dip_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: